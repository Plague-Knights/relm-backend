[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
soneium_minato = "https://rpc.minato.soneium.org"

[etherscan]
soneium_minato = { key = "${BLOCKSCOUT_API_KEY}", url = "https://soneium-minato.blockscout.com/api" }
